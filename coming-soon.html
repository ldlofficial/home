<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="assets/favicon.png">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<template id="__bundler_thumbnail" data-bg-color="#ffffff">
  <svg viewBox="0 0 100 56" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="56" fill="#ffffff"/>
    <text x="10" y="30" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#14161c">LDL</text>
    <circle cx="72" cy="26" r="14" fill="#1c2a5e"/>
  </svg>
</template>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #ffffff; }
  * { box-sizing: border-box; }
  a { color: #3b4a8c; }
  a:hover { color: #14161c; }
  .ldl-nav-link { position: relative; }
  .ldl-nav-underline { position: absolute; left: 0; right: 0; bottom: -6px; height: 1px; background: #3b4a8c; transform: scaleX(0); transform-origin: left; transition: transform 0.45s ease; }
  .ldl-nav-link:hover .ldl-nav-underline { transform: scaleX(1); }
  .ldl-nav-item-wrap { position: relative; }
  .ldl-dropdown { position: absolute; top: 100%; left: 50%; transform: translateX(-50%); padding-top: 14px; width: max-content; transition: opacity 0.2s ease; }
  .ldl-dropdown-panel { min-width: 176px; background: #ffffff; border: 1px solid #ececef; box-shadow: 0 12px 32px rgba(20,22,28,0.08); padding: 10px 0; }
  .ldl-dropdown-link { display: block; padding: 12px 22px; font: 400 13px/1.4 'Noto Sans JP', sans-serif; color: #14161c; text-decoration: none; white-space: nowrap; transition: color 0.2s ease, background 0.2s ease; }
  .ldl-dropdown-link:hover { background: #f7f7f9; color: #3b4a8c; }
  .ldl-footer-link { position: relative; display: inline-block; }
  .ldl-footer-underline { position: absolute; left: 0; right: 0; bottom: -3px; height: 1px; background: #9aa0aa; transform: scaleX(0); transform-origin: left; transition: transform 0.4s ease; }
  .ldl-footer-link:hover .ldl-footer-underline { transform: scaleX(1); }
  .ldl-legal-link { transition: color 0.2s ease; }
  .ldl-legal-link:hover { color: #14161c !important; }
  .ldl-back-link { position: relative; display: inline-block; }
  .ldl-back-underline { position: absolute; left: 0; right: 0; bottom: -3px; height: 1px; background: #14161c; transform: scaleX(0); transform-origin: left; transition: transform 0.4s ease; }
  .ldl-back-link:hover .ldl-back-underline { transform: scaleX(1); }
  @media (max-width: 780px) {
    .ldl-footer-top { flex-direction: column !important; align-items: center !important; text-align: center !important; gap: 28px !important; }
    .ldl-footer-sitemap { grid-template-columns: repeat(2, 1fr) !important; text-align: center !important; width: auto !important; max-width: 340px !important; margin: 0 auto !important; gap: 32px !important; }
    .ldl-footer-sitemap a, .ldl-footer-sitemap > div > div { text-align: center !important; }
    .ldl-footer-sitemap > div { display: flex !important; flex-direction: column !important; align-items: center !important; }
    .ldl-footer-link { width: fit-content !important; }
    .ldl-footer-underline { left: 50% !important; right: auto !important; width: 100% !important; transform: translateX(-50%) scaleX(0) !important; }
    .ldl-footer-link:hover .ldl-footer-underline { transform: translateX(-50%) scaleX(1) !important; }
    .ldl-footer-bottom { flex-direction: column !important; gap: 12px !important; text-align: center !important; justify-content: center !important; }
    .ldl-topbar { padding: 10px 20px !important; }
    .ldl-nav-links { display: none !important; }
    .ldl-hamburger-btn { display: flex !important; }
    .ldl-empty-section { padding: 96px 28px !important; min-height: 60vh !important; }
    .ldl-empty-section h2 { font-size: 26px !important; }
  }
  @media (min-width: 781px) {
    .ldl-hamburger-btn { display: none !important; }
  }
</style>
</helmet>

<div style="position:relative; width:100%; background:#ffffff; font-family:'Noto Sans JP', sans-serif;" data-screen-label="{{ pageLabel }} — Coming Soon">

  <div class="ldl-topbar" style="position:relative; z-index:5; display:flex; align-items:center; justify-content:space-between; padding:14px 56px; gap:24px; border-bottom:1px solid #f0f0f2;">
    <a href="index.html" style="display:block; flex-shrink:0;"><img src="assets/logo.png" alt="LDL - Luminaries Development Lab" style="height:clamp(58px,7vw,86px); width:auto; display:block;" /></a>
    <div style="display:flex; align-items:center; gap:40px; flex:1; justify-content:flex-end;">
      <nav class="ldl-nav-links" style="display:flex; align-items:center; gap:34px;">
        <sc-for list="{{ headerNavItems }}" as="item" hint-placeholder-count="5">
          <div class="ldl-nav-item-wrap" onMouseEnter="{{ item.onEnter }}" onMouseLeave="{{ item.onLeave }}">
            <a href="{{ item.href }}" class="ldl-nav-link" style="{{ item.navLinkStyle }}">
              {{ item.label }}
              <span class="ldl-nav-underline" style="{{ item.navUnderlineStyle }}"></span>
            </a>
            <sc-if value="{{ item.children }}" hint-placeholder-val="{{ false }}">
              <div class="ldl-dropdown" style="{{ item.dropdownStyle }}" onMouseEnter="{{ item.onEnter }}" onMouseLeave="{{ item.onLeave }}">
                <div class="ldl-dropdown-panel">
                  <sc-for list="{{ item.children }}" as="child" hint-placeholder-count="2">
                    <a href="{{ child.href }}" class="ldl-dropdown-link">{{ child.label }}</a>
                  </sc-for>
                </div>
              </div>
            </sc-if>
          </div>
        </sc-for>
      </nav>
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSd4lhmC5cHD82mSO-J9GodRcRdzPND4b44hjS5qV4HW4Ribcg/viewform" target="_blank" rel="noopener" onMouseEnter="{{ onContactEnter }}" onMouseLeave="{{ onContactLeave }}" style="{{ contactBtnStyle }}">Contact</a>
      <button aria-label="menu" onClick="{{ toggleMenu }}" class="ldl-hamburger-btn" style="background:none; border:none; cursor:pointer; padding:8px; flex-direction:column; gap:6px; align-items:flex-end; flex-shrink:0;">
        <span style="display:block; width:26px; height:2px; background:#12141a;"></span>
        <span style="display:block; width:26px; height:2px; background:#12141a;"></span>
      </button>
    </div>
  </div>

  <sc-if value="{{ menuOpen }}" hint-placeholder-val="{{ false }}">
    <div style="position:fixed; inset:0; z-index:20; background:rgba(12,15,26,0.98); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:34px;">
      <button aria-label="close" onClick="{{ toggleMenu }}" style="position:absolute; top:34px; right:44px; background:none; border:none; cursor:pointer; color:#f4f5f8; font-size:28px; font-weight:300; line-height:1;">✕</button>
      <sc-for list="{{ overlayNavItems }}" as="item" hint-placeholder-count="6">
        <div style="display:flex; flex-direction:column; align-items:center; gap:12px;">
          <a href="{{ item.href }}" target="{{ item.target }}" onClick="{{ toggleMenu }}" style="font:400 15px/1 'Noto Sans JP', sans-serif; letter-spacing:0.2em; text-transform:uppercase; color:#e8e9ee; text-decoration:none; padding:6px 0;">{{ item.label }}</a>
          <sc-if value="{{ item.children }}" hint-placeholder-val="{{ false }}">
            <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
              <sc-for list="{{ item.children }}" as="child" hint-placeholder-count="2">
                <a href="{{ child.href }}" onClick="{{ toggleMenu }}" style="font:400 13px/1 'Noto Sans JP', sans-serif; letter-spacing:0.08em; color:rgba(232,233,238,0.55); text-decoration:none; padding:2px 0;">{{ child.label }}</a>
              </sc-for>
            </div>
          </sc-if>
        </div>
      </sc-for>
    </div>
  </sc-if>

  <section class="ldl-empty-section" style="min-height:70vh; padding:180px 56px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:24px;" data-screen-label="Coming Soon">
    <div style="font:500 11px/1 'Noto Sans JP', sans-serif; letter-spacing:0.2em; color:#c3c6cc;">{{ pageLabelUpper }}</div>
    <h2 style="margin:0; font:600 clamp(22px,2.8vw,32px)/1.6 'Shippori Mincho', serif; color:#14161c;">このページは現在準備中です。</h2>
    <a href="#home" class="ldl-back-link" style="margin-top:8px; font:400 14px/1 'Noto Sans JP', sans-serif; color:#5a606b; text-decoration:none;">
      ホームに戻る
      <span class="ldl-back-underline"></span>
    </a>
  </section>

  <footer style="background:#ffffff; font-family:'Noto Sans JP', sans-serif; padding:72px 56px 28px; border-top:1px solid #f0f0f2;" data-screen-label="Footer">
    <div class="ldl-footer-top" style="display:flex; flex-wrap:wrap; align-items:flex-start; justify-content:center; max-width:1280px; margin:0 auto; padding-bottom:56px;">
      <div class="ldl-footer-sitemap" style="display:grid; grid-template-columns:repeat(5, minmax(120px,1fr)); gap:56px; width:100%; max-width:920px;">
        <sc-for list="{{ navItems }}" as="item" hint-placeholder-count="5">
          <div>
            <div style="font:500 13px/1 'Noto Sans JP', sans-serif; color:#14161c; margin-bottom:16px;">{{ item.label }}</div>
            <sc-for list="{{ item.children }}" as="child" hint-placeholder-count="2">
              <a href="{{ child.href }}" class="ldl-footer-link" style="display:block; margin-bottom:11px; font:400 13px/1.5 'Noto Sans JP', sans-serif; color:#7a808a; text-decoration:none;">
                {{ child.label }}
                <span class="ldl-footer-underline"></span>
              </a>
            </sc-for>
          </div>
        </sc-for>
      </div>
    </div>
    <div style="max-width:1280px; margin:0 auto; border-top:1px solid #ececef;"></div>
    <div class="ldl-footer-bottom" style="display:flex; align-items:center; justify-content:center; gap:24px; max-width:1280px; margin:0 auto; padding-top:24px;">
      <div style="font:400 12px/1.5 'Noto Sans JP', sans-serif; color:#9aa0aa;">© LDL Luminaries Development Lab. All Rights Reserved.</div>
      <div style="display:flex; align-items:center; gap:24px;">
        <a href="#privacy" class="ldl-legal-link" style="font:400 12px/1.5 'Noto Sans JP', sans-serif; color:#9aa0aa; text-decoration:none;">Privacy Policy</a>
        <a href="#terms" class="ldl-legal-link" style="font:400 12px/1.5 'Noto Sans JP', sans-serif; color:#9aa0aa; text-decoration:none;">Terms of Use</a>
      </div>
    </div>
  </footer>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1440, &quot;height&quot;: 900}, &quot;pageLabel&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;Impact&quot;, &quot;options&quot;: [&quot;Impact&quot;, &quot;Insights&quot;], &quot;tsType&quot;: &quot;string&quot;}}">
class Component extends DCLogic {
  state = { menuOpen: false, contactHover: false, openNavIndex: null };

  navCloseTimer = null;

  onContactEnter = () => this.setState({ contactHover: true });
  onContactLeave = () => this.setState({ contactHover: false });

  handleNavEnter = (idx) => {
    if (this.navCloseTimer) clearTimeout(this.navCloseTimer);
    this.setState({ openNavIndex: idx });
  };

  handleNavLeave = () => {
    if (this.navCloseTimer) clearTimeout(this.navCloseTimer);
    this.navCloseTimer = setTimeout(() => {
      this.setState({ openNavIndex: null });
    }, 300);
  };

  navItemsBase = [
    { label: 'About', href: 'about.html', children: [
      { label: 'LDLとは', href: 'about.html' },
    ] },
    { label: 'Science', href: 'science.html', children: [
      { label: '認知科学とは', href: 'science.html' },
    ] },
    { label: 'Services', href: 'education.html', children: [
      { label: '教育機関向け', href: 'education.html' },
      { label: 'パーソナルコーチング', href: 'personal-coaching.html' },
      { label: 'コーポレートコーチング', href: 'corporate-coaching.html' },
    ] },
    { label: 'Impact', href: 'coming-soon.html', children: [
      { label: '事例一覧', href: 'coming-soon.html' },
      { label: '実績・数字', href: 'coming-soon.html' },
      { label: 'パートナー', href: 'coming-soon.html' },
    ] },
    { label: 'Insights', href: 'coming-soon.html', children: [
      { label: '記事一覧', href: 'coming-soon.html' },
    ] },
  ];

  toggleMenu = () => {
    this.setState(s => ({ menuOpen: !s.menuOpen }));
  };

  renderVals() {
    const currentPage = this.props.pageLabel ?? 'Impact';

    const navItems = this.navItemsBase.map(item => {
      const active = item.label === currentPage;
      return {
        ...item,
        navLinkStyle: {
          font: active ? "600 14px/1 'Noto Sans JP', sans-serif" : "500 14px/1 'Noto Sans JP', sans-serif",
          color: '#14161c',
          textDecoration: 'none',
          whiteSpace: 'nowrap',
          display: 'inline-block',
          paddingBottom: '2px',
        },
        navUnderlineStyle: active ? { transform: 'scaleX(1)' } : {},
      };
    });

    const overlayNavItems = [
      ...this.navItemsBase.map(item => ({
        label: item.label,
        href: item.href,
        children: item.children && item.children.length > 1 ? item.children : null,
      })),
      { label: 'Contact', href: 'https://docs.google.com/forms/d/e/1FAIpQLSd4lhmC5cHD82mSO-J9GodRcRdzPND4b44hjS5qV4HW4Ribcg/viewform', target: '_blank' },
    ];

    const openNavIndex = this.state.openNavIndex;
    const headerNavItems = navItems.map((item, idx) => ({
      ...item,
      onEnter: () => this.handleNavEnter(idx),
      onLeave: this.handleNavLeave,
      dropdownStyle: item.children ? { opacity: openNavIndex === idx ? 1 : 0, pointerEvents: openNavIndex === idx ? 'auto' : 'none' } : undefined,
    }));

    const contactHover = this.state.contactHover;
    const contactBtnStyle = {
      flexShrink: 0,
      display: 'inline-flex',
      alignItems: 'center',
      justifyContent: 'center',
      padding: '9px 13px',
      background: contactHover ? '#3b4a8c' : '#14161c',
      color: '#ffffff',
      font: "500 14px/1 'Noto Sans JP', sans-serif",
      textDecoration: 'none',
      whiteSpace: 'nowrap',
      transition: 'background 0.25s ease, transform 0.25s ease',
      transform: contactHover ? 'scale(1.035)' : 'scale(1)',
    };

    return {
      menuOpen: this.state.menuOpen,
      toggleMenu: this.toggleMenu,
      headerNavItems: headerNavItems,
      navItems: navItems,
      overlayNavItems: overlayNavItems,
      onContactEnter: this.onContactEnter,
      onContactLeave: this.onContactLeave,
      contactBtnStyle: contactBtnStyle,
      pageLabel: currentPage,
      pageLabelUpper: currentPage.toUpperCase(),
    };
  }
}

</script>
</body>
</html>
